name: release-opensuper

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.2.6"
        required: false
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "无法解析发布版本。请在 workflow_dispatch 中提供 version，或使用 v* tag push。"
          }
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Sync package version
        shell: pwsh
        run: |
          $package = Get-Content .\package.json -Raw | ConvertFrom-Json
          if ($package.version -ne $env:PACKAGE_VERSION) {
            npm version $env:PACKAGE_VERSION --no-git-tag-version
          }
          else {
            Write-Host "package.json version already matches $env:PACKAGE_VERSION"
          }

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Build
        shell: pwsh
        run: pnpm build

      - name: Test
        shell: pwsh
        run: pnpm test

      - name: Pack check
        shell: pwsh
        run: npm pack --dry-run

      - name: Publish npm package
        shell: pwsh
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OpenSuper v${{ env.PACKAGE_VERSION }}
          body: |
            Release summary for OpenSuper v${{ env.PACKAGE_VERSION }}

            - npm package: `@pzy560117/opensuper`
            - repository: `pzy560117/opensuper`
            - workflow: `release-opensuper`
            - checks: build, test, pack check, npm publish
